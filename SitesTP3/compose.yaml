services:
    proxy:
        image: nginx:alpine # utilise la version la plus récente
        ports:
            - '80:80' # expose 80 sur l’hôte et envoie à 80 dans conteneur
        networks:
            - frontend
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    serveur1:
        build: './serveur1/'  # utilise la version httpd:lapine
        depends_on:
            - php1
            - mariadb1
        networks:
            - frontend
            - backend
        volumes:
            - ./serveur1/html:/usr/local/apache2/htdocs/
    serveur2:
        build: './serveur2/'  # utilise la version httpd:alpine
        depends_on:
            - php2
            - mariadb2
        networks:
            - frontend
            - backend
        volumes:
            - ./serveur2/html:/usr/local/apache2/htdocs/
    php1:
        build: './php/'
        networks:
            - backend
        volumes:
            - ./serveur1/html:/srv/htdocs
    mariadb1:
        image: mariadb
        restart: always
        networks:
            - backend
        environment:
            - MYSQL_ROOT_PASSWORD=rootpassword
        volumes:
            - dbdata1:/var/lib/mysql
    php2:
        build: './php/'
        networks:
            - backend
        volumes:
            - ./serveur2/html:/srv/htdocs
    mariadb2:
        image: mariadb
        restart: always
        networks:
            - backend
        environment:
            - MYSQL_ROOT_PASSWORD=rootpassword
        volumes:
            - dbdata2:/var/lib/mysql
networks:
    frontend:
    backend:
volumes:
    dbdata1:
    dbdata2: